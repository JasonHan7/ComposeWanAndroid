name: Android CI/CD

on:
  push:
    tags:
      - 'v*' # 当推送以 v 开头的 tag 时触发 (例如 v1.0.0)
  workflow_dispatch: # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease

      - name: Rename APK
        if: startsWith(github.ref, 'refs/tags/')
        run: mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/WanAndroid_${{ github.ref_name }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            app/build/outputs/apk/release/WanAndroid_${{ github.ref_name }}.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
