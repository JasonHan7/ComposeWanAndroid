name: Android CI/CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 放在顶层，确保覆盖整个工作流
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Rename APK
        run: |
          # 签名后的文件通常带有 -signed 后缀
          SIGNED_APK=$(find app/build/outputs/apk/release/ -name "*-signed.apk" | head -n 1)
          if [ -z "$SIGNED_APK" ]; then
             # 兜底：如果没找到带 signed 后缀的，就找普通 release apk
             SIGNED_APK=$(find app/build/outputs/apk/release/ -name "*release.apk" | head -n 1)
          fi
          
          if [ -n "$SIGNED_APK" ]; then
            mv "$SIGNED_APK" app/build/outputs/apk/release/WanAndroid_${{ github.ref_name }}.apk
          else
            echo "No signed APK found"
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WanAndroid-APK
          path: app/build/outputs/apk/release/WanAndroid_${{ github.ref_name }}.apk
          retention-days: 7

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            app/build/outputs/apk/release/WanAndroid_${{ github.ref_name }}.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
